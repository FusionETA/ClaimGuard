<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClaimGuard Offline</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f9fb;
        --surface: #ffffff;
        --foreground: #191c1e;
        --muted: #5d6470;
        --primary: #0a396c;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(42, 80, 132, 0.16), transparent 42%),
          radial-gradient(circle at top right, rgba(203, 231, 245, 0.4), transparent 28%),
          var(--background);
        font-family: Inter, system-ui, sans-serif;
        color: var(--foreground);
        padding: 24px;
      }

      main {
        width: min(100%, 480px);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(10, 57, 108, 0.1);
      }

      h1 {
        font-family: Manrope, Inter, system-ui, sans-serif;
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      strong {
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re Offline</h1>
      <p>
        ClaimGuard can still open previously cached pages, but live claim data and
        submission need a connection. Reconnect to sync with <strong>DigitalOcean MySQL</strong>.
      </p>
    </main>
  </body>
</html>
